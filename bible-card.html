<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word of Grace — 聖經經文卡牌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #fff;
  }

  .app {
    max-width: 700px;
    margin: 0 auto;
    padding: 32px 20px 48px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 {
    font-family: 'Cinzel', serif;
    color: #f0d080;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .header .subtitle {
    color: rgba(240,208,128,0.55);
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Category Grid ── */
  .cats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }

  .cat-btn {
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(240,208,128,0.25);
    border-radius: 12px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    color: rgba(255,255,255,0.82);
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    line-height: 1.6;
    transition: all 0.18s;
  }
  .cat-btn:hover {
    background: rgba(240,208,128,0.12);
    border-color: rgba(240,208,128,0.55);
    color: #f0d080;
    transform: translateY(-2px);
  }
  .cat-icon { font-size: 20px; display: block; margin-bottom: 5px; }

  /* ── Card Page ── */
  .card-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .cat-label {
    color: #f0d080;
    font-size: 16px;
    letter-spacing: 3px;
    text-align: center;
  }
  .cards-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── Flip Card ── */
  .verse-card {
    width: 165px;
    height: 225px;
    perspective: 900px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(.4,0,.2,1);
  }
  .verse-card.flipped .card-inner { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .card-back {
    background: linear-gradient(145deg, #1e1040 0%, #2a1a5e 100%);
    border: 1px solid rgba(240,208,128,0.38);
  }
  .cb-deco {
    position: absolute;
    top: 7px; left: 7px; right: 7px; bottom: 7px;
    border: 0.5px solid rgba(240,208,128,0.15);
    border-radius: 10px;
    pointer-events: none;
  }
  .cross {
    width: 40px; height: 40px;
    position: relative;
    margin-bottom: 10px;
  }
  .cross::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 5px; height: 100%;
    background: rgba(240,208,128,0.5);
    border-radius: 3px;
  }
  .cross::after {
    content: '';
    position: absolute;
    top: 35%; left: 0;
    width: 100%; height: 5px;
    background: rgba(240,208,128,0.5);
    border-radius: 3px;
  }
  .cb-text {
    color: rgba(240,208,128,0.45);
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2.5px;
  }

  .card-front {
    background: linear-gradient(160deg, #f9f3e8 0%, #efe6cc 100%);
    border: 1px solid rgba(180,140,60,0.45);
    transform: rotateY(180deg);
    padding: 16px 13px;
    flex-direction: column;
    justify-content: space-between;
  }
  .v-ref {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: #8b6914;
    letter-spacing: 1px;
    text-align: center;
  }
  .v-text {
    font-size: 11.5px;
    color: #3a2808;
    line-height: 1.85;
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    padding: 8px 0;
  }
  .v-cat {
    font-size: 9px;
    color: #a07828;
    text-align: center;
    letter-spacing: 1px;
    padding-top: 6px;
    border-top: 0.5px solid rgba(160,120,40,0.3);
    width: 100%;
  }

  /* ── Buttons ── */
  .btn-gold {
    background: transparent;
    border: 1px solid rgba(240,208,128,0.5);
    border-radius: 50px;
    padding: 12px 36px;
    color: #f0d080;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  .btn-gold:hover { background: rgba(240,208,128,0.12); border-color: #f0d080; }
  .btn-gold:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    border: none;
    color: rgba(240,208,128,0.45);
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    padding: 8px 16px;
    transition: color 0.2s;
  }
  .btn-ghost:hover { color: #f0d080; }

  .flip-hint {
    font-size: 11px;
    color: rgba(240,208,128,0.38);
    text-align: center;
    margin-top: -8px;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 4px;
  }

  /* ── Prayer Page ── */
  .prayer-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    padding: 8px 0 24px;
  }

  .prayer-verse-box {
    background: rgba(240,208,128,0.07);
    border: 0.5px solid rgba(240,208,128,0.3);
    border-radius: 16px;
    padding: 20px 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .prayer-verse-ref {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: #f0d080;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .prayer-verse-text {
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    line-height: 2;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }
  .divider-line { flex: 1; height: 0.5px; background: rgba(240,208,128,0.22); }
  .divider-icon { color: rgba(240,208,128,0.5); font-size: 14px; }

  .prayer-box {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(240,208,128,0.2);
    border-radius: 16px;
    padding: 22px 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .prayer-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: rgba(240,208,128,0.6);
    letter-spacing: 2.5px;
    margin-bottom: 14px;
  }
  .prayer-text {
    font-size: 14px;
    color: rgba(255,255,255,0.82);
    line-height: 2.2;
    font-style: italic;
  }
  .amen {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: #f0d080;
    letter-spacing: 3px;
    margin-top: 14px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(240,208,128,0.25); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .app { padding: 24px 14px 40px; }
    .header h1 { font-size: 20px; }
    .cats-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
    .verse-card { width: 145px; height: 205px; }
    .prayer-verse-text, .prayer-text { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✦ WORD OF GRACE ✦</h1>
    <div class="subtitle">聖 經 經 文 卡 牌</div>
  </div>

  <!-- Page 1: Select Category -->
  <div class="page active" id="pg-select">
    <div class="cats-grid" id="catGrid"></div>
  </div>

  <!-- Page 2: Card Draw -->
  <div class="page" id="pg-cards">
    <div class="card-area">
      <div class="cat-label" id="catTitle"></div>
      <div class="cards-row" id="cardsRow"></div>
      <p class="flip-hint">點擊卡牌翻開經文，再點擊「進入禱告」</p>
      <button class="btn-gold" id="drawBtn">✦ 隨機抽取一張 ✦</button>
      <div class="nav-row">
        <button class="btn-ghost" id="backBtn">← 返回情境</button>
        <button class="btn-gold" id="prayBtn" style="font-size:13px;padding:10px 24px;" disabled>🙏 進入禱告</button>
      </div>
    </div>
  </div>

  <!-- Page 3: Prayer -->
  <div class="page" id="pg-prayer">
    <div class="prayer-page">
      <div class="prayer-verse-box">
        <div class="prayer-verse-ref" id="pr-ref"></div>
        <div class="prayer-verse-text" id="pr-vtext"></div>
      </div>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-icon">✦</div>
        <div class="divider-line"></div>
      </div>
      <div class="prayer-box">
        <div class="prayer-title">— 禱  告 —</div>
        <div class="prayer-text" id="pr-prayer"></div>
        <span class="amen">阿  們</span>
      </div>
      <div class="nav-row">
        <button class="btn-ghost" id="prayBackCards">← 返回卡牌</button>
        <button class="btn-gold" id="newDrawBtn" style="font-size:12px;padding:10px 22px;">✦ 再抽一張</button>
        <button class="btn-ghost" id="prayBackSelect">↩ 換情境</button>
      </div>
    </div>
  </div>
</div>

<script>
const data = [
  { icon:"💼", name:"工作壓力", verses:[
    { ref:"馬太福音 11:28", text:"凡勞苦擔重擔的人，可以到我這裡來，我就使你們得安息。", prayer:"天父，我今天感到工作的重擔壓在我身上。求你接過我的疲乏，賜我力量與智慧去面對每一項挑戰。提醒我，我的身份不在於工作成就，乃在於你的愛。" },
    { ref:"腓立比書 4:13", text:"我靠著那加給我力量的，凡事都能做。", prayer:"主耶穌，當我感到自己能力不足時，求你成為我的力量。我願意倚靠你，而非只靠自己。讓我在壓力中仍能平靜，因為你在我裡面動工。" },
    { ref:"詩篇 55:22", text:"你要把你的重擔卸給耶和華，他必撫養你；他永不叫義人動搖。", prayer:"耶和華神，我現在把所有工作的壓力和憂慮交在你手中。求你撫養我，托住我，使我不因重擔而倒下，在你懷抱中找到真正的安息。" }
  ]},
  { icon:"💰", name:"財務困難", verses:[
    { ref:"腓立比書 4:19", text:"我的神必照他榮耀的豐富，在基督耶穌裡，使你們一切所需用的都充足。", prayer:"供應的神，我坦誠地告訴你我此刻的財務需要。我選擇信靠你，而非陷入恐懼。求你按你豐富的恩典開路，也賜我智慧管理手中所有的。" },
    { ref:"詩篇 37:25", text:"我從前年幼，現在年老，卻未見過義人被棄，也未見過他的後裔討飯。", prayer:"信實的主，你的話語讓我有盼望。在財務困難中，我選擇不絕望，因你從未遺棄愛你的人。求你引導我，供應我每日所需，使我學會知足。" },
    { ref:"申命記 8:18", text:"你要記念耶和華你的神，因為得財富的力量是他給你的。", prayer:"天父，提醒我一切能力都是你所賜。求你賜我工作的機會與智慧，使我脫離困乏。在等待中，使我的心仍然倚靠你，不失去信心。" }
  ]},
  { icon:"💑", name:"夫妻關係", verses:[
    { ref:"以弗所書 4:32", text:"並要以恩慈相待，存憐憫的心，彼此饒恕，正如神在基督裡饒恕了你們一樣。", prayer:"愛的神，求你軟化我的心，讓我以恩慈對待我的伴侶。當我想要爭辯時，賜我謙遜；當我受傷時，賜我饒恕的能力。讓你的愛流過我們的婚姻。" },
    { ref:"哥林多前書 13:4", text:"愛是恆久忍耐，又有恩慈；愛是不嫉妒，不自誇，不張狂。", prayer:"主，求你讓我活出真實的愛——不是感情用事，而是每日的選擇。在我們的關係中，讓我先學習付出，而非計算得失。使我們的婚姻榮耀你。" },
    { ref:"傳道書 4:9", text:"兩個人總比一個人好，因為二人勞碌同得美好的果效。", prayer:"神啊，感謝你賜給我這段婚姻關係。在我們面臨衝突或距離時，求你提醒我們：我們是同伴，不是對手。讓我們攜手同行，在你裡面合而為一。" }
  ]},
  { icon:"😟", name:"焦慮憂愁", verses:[
    { ref:"腓立比書 4:6-7", text:"應當一無掛慮，只要凡事藉著禱告、祈求，和感謝，將你們所要的告訴神。", prayer:"天父，我把心中所有的憂慮和害怕，一一擺在你面前。我選擇用感謝代替擔憂，用禱告代替焦慮。求你賜我那超越理解的平安，守住我的心。" },
    { ref:"彼得前書 5:7", text:"你們要將一切的憂慮卸給神，因為他顧念你們。", prayer:"主耶穌，你說你顧念我。在我焦慮不安的時刻，讓這句話成為我的錨。我現在將憂慮一件一件地交給你，相信你必看顧。" },
    { ref:"約翰福音 14:27", text:"我留下平安給你們，我將我的平安賜給你們；你們心裡不要憂愁，也不要膽怯。", prayer:"賜平安的主，你留下的平安不像世界的平安。求你讓這真實的平安充滿我的內心，驅散一切的憂愁與膽怯，使我能在風浪中仍然安靜。" }

  { icon:"🙏", name:"信心軟弱", verses:[

    { ref:"馬可福音 9:23", text:"耶穌對他說：你若能信，在乎信的人，凡事都能。", prayer:"主耶穌，我像那個父親一樣呼喊：我信，但我信不足！求你幫助我克服不信，在每一次懷疑中，讓我選擇再次仰望你。" },
    { ref:"羅馬書 10:17", text:"可見信道是從聽道來的，聽道是從基督的話來的。", prayer:"天父，讓我更多親近你的話語，讓聖靈透過聖經對我說話。在讀到真理的時刻，堅固我的信心，使我不再漂泊，乃是穩穩立在你的應許上。" }

  { icon:"😔", name:"失敗挫折", verses:[

  { icon:"😢", name:"悲傷哀痛", verses:[
    { ref:"詩篇 34:18", text:"耶和華靠近傷心的人，拯救靈性痛悔的人。", prayer:"耶和華，你靠近傷心的人。我現在很痛，求你靠近我。讓我感受到你的同在，在淚水中知道你並未離去，你的手一直托著我。" },

  { icon:"🏥", name:"疾病痛苦", verses:[

    { ref:"雅各書 5:15", text:"出於信心的祈禱要救那病人，主必叫他起來。", prayer:"主，我以信心向你禱告，求你醫治。同時，我也信靠你的主權，知道你的時間和方式都是最好的。在病痛中，讓我仍能讚美你，經歷你的同在。" },
    { ref:"以賽亞書 41:10", text:"你不要害怕，因為我與你同在；不要驚惶，因為我是你的神。", prayer:"神啊，面對疾病我有時感到恐懼。你說：不要害怕，我與你同在。讓這句話在我心中深深紮根，使我在每一次檢查、每一個夜晚，都感受到你的陪伴與保護。" }
  ]},
  { icon:"👨‍👩‍👦", name:"親子教養", verses:[

let curCat = null, curVerse = null;

function gotoPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCats() {
  const g = document.getElementById('catGrid');
  g.innerHTML = '';
  data.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'cat-btn';
    b.innerHTML = `<span class="cat-icon">${c.icon}</span>${c.name}`;
    b.onclick = () => showCards(i);
    g.appendChild(b);
  });
}

function showCards(idx) {
  curCat = idx;
  curVerse = null;
  const cat = data[idx];
  document.getElementById('catTitle').textContent = `${cat.icon}　${cat.name}`;
  const row = document.getElementById('cardsRow');
  row.innerHTML = '';
  cat.verses.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'verse-card';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="cb-deco"></div>
          <div class="cross"></div>
          <div class="cb-text">GOD'S WORD</div>
        </div>
        <div class="card-face card-front">
          <div class="v-ref">${v.ref}</div>
          <div class="v-text">${v.text}</div>
          <div class="v-cat">${cat.name}</div>
        </div>
      </div>`;
    card.onclick = () => {
      document.querySelectorAll('.verse-card').forEach(c => c.classList.remove('flipped'));
      card.classList.add('flipped');
      curVerse = i;
      const pb = document.getElementById('prayBtn');
      pb.disabled = false;
    };
    row.appendChild(card);
  });
  const pb = document.getElementById('prayBtn');
  pb.disabled = true;
  gotoPage('pg-cards');
}

function drawRandom() {
  const cards = document.querySelectorAll('.verse-card');
  cards.forEach(c => c.classList.remove('flipped'));
  const pick = Math.floor(Math.random() * cards.length);
  setTimeout(() => {
    cards[pick].classList.add('flipped');
    curVerse = pick;
    document.getElementById('prayBtn').disabled = false;
  }, 100);
}

function showPrayer() {
  if (curVerse === null) return;
  const v = data[curCat].verses[curVerse];
  document.getElementById('pr-ref').textContent = v.ref;
  document.getElementById('pr-vtext').textContent = v.text;
  document.getElementById('pr-prayer').textContent = v.prayer;
  gotoPage('pg-prayer');
}

document.getElementById('drawBtn').onclick = drawRandom;
document.getElementById('prayBtn').onclick = showPrayer;
document.getElementById('backBtn').onclick = () => gotoPage('pg-select');
document.getElementById('prayBackCards').onclick = () => gotoPage('pg-cards');
document.getElementById('prayBackSelect').onclick = () => gotoPage('pg-select');
document.getElementById('newDrawBtn').onclick = () => { gotoPage('pg-cards'); setTimeout(drawRandom, 80); };

renderCats();
</script>
